[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
 
# Coverage
[profile.default.fuzz]
runs = 256
seed = "0xdeadbeef"
 
[profile.default.invariant]
runs = 64
depth = 15
fail_on_revert = false
 
# CI profile — more fuzz runs
[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 30 }
 
# RPC endpoints for fork tests
[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"

# Etherscan verification (block explorers)
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }

# Formatter
[fmt]
line_length   = 120
tab_width     = 4
bracket_spacing = true
int_types     = "long"