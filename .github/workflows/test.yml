name: Foundry CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  check:
    strategy:
      fail-fast: true
    name: Foundry Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run Foundry Tests
        run: forge test -vvv