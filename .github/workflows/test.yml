name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]

env:
  FOUNDRY_PROFILE: ci

jobs:
  build-and-test:
    name: Build, Test, Coverage, Slither
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Node.js (for frontend lint)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Forge fmt check
        run: forge fmt --check

      - name: Solhint
        run: npx solhint 'contracts/src/**/*.sol' --config .solhint.json

      - name: Prettier (frontend)
        run: npm run lint --prefix frontend

      - name: Install Foundry deps (submodules)
        run: forge install

      - name: Build contracts
        run: forge build --sizes

      - name: Run unit + fuzz + invariant tests
        run: forge test --no-match-contract ForkTests -v
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}

      - name: Run fork tests
        run: forge test --match-contract ForkTests -v
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        continue-on-error: false # Fork tests must pass

      - name: Coverage report
        run: |
          forge coverage --no-match-contract ForkTests --report lcov --report summary > coverage-summary.txt
          cat coverage-summary.txt
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}

      - name: Check coverage threshold (≥90%)
        run: |
          LINE_COV=$(grep "Lines" coverage-summary.txt | awk '{print $NF}' | tr -d '%')
          echo "Line coverage: $LINE_COV%"
          if (( $(echo "$LINE_COV < 90" | bc -l) )); then
            echo "Coverage $LINE_COV% is below 90% threshold"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-summary.txt

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Run Slither
        run: |
          slither . --config-file slither.config.json 2>&1 | tee slither-output.txt
          # Fail if High or Medium findings (exit code 1 = findings)
          if grep -q "Impact: High\|Impact: Medium" slither-output.txt; then
            echo "Slither found High/Medium severity issues!"
            cat slither-output.txt
            exit 1
          fi

      - name: Upload Slither output
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: slither-output.txt

  gas-snapshot:
    name: Gas Snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge install
      - run: forge snapshot --no-match-contract ForkTests
      - uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: .gas-snapshot